<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Make hijrah to Saudi Arabia | Hijrah to Saudi</title>
<meta name="description" content="Moving to Saudi Arabia, done properly. Answer two questions and get your route: work, study, business, property or marriage. Real 2026 prices. Team on the ground in the Hijaz.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

:root {
  --bg: #f7f5f0;
  --ink: #0e2c57;
  --ink-soft: #5a6b84;
  --gold: #c9a227;
  --teal: #2c6e63;
  --line: #e3ded2;
  --wa: #1fa855;
}

* { box-sizing: border-box; margin: 0; }

html, body { height: 100%; }

.topbar { font-size: 0.8rem; color: var(--ink-soft); text-align: right; padding: 0.35rem 1rem 0; }

body {
  font-family: Inter, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.4rem 1.2rem; flex-wrap: wrap;
  padding: 0.8rem 1rem;
}

.mark { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--ink); }

.mark svg { width: 1.5rem; height: 1.5rem; }

.mark b { font-weight: 900; letter-spacing: -0.02em; font-size: 1.3rem; }
.mark b span { color: #a8871f; }

header nav { display: flex; gap: 0 0.3rem; flex-wrap: wrap; }
header nav a { color: var(--ink-soft); text-decoration: none; font-size: 0.88rem; padding: 0.2rem 0.45rem; }
header nav a:hover { color: var(--teal); }
header nav a.on { color: var(--teal); font-weight: 700; }

main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 3rem 1.4rem 2.4rem;
}

.screen { width: 100%; max-width: 40rem; animation: rise 0.35s ease; }

@keyframes rise { from { opacity: 0; transform: translateY(14px); } }

.step {
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.18em;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 1rem;
}

h1 {
  font-size: clamp(2.1rem, 7vw, 3.6rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.04;
  margin-bottom: 0.7rem;
}

.sub { color: var(--ink-soft); font-size: 1.02rem; max-width: 34rem; margin-bottom: 1.6rem; }

.qline { font-weight: 800; font-size: 1.2rem; margin-bottom: 0.9rem; }

.opts { display: flex; flex-direction: column; gap: 0.55rem; }

.opts button {
  font-family: inherit;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: block;
  width: 100%;
  text-align: left;
  font-size: 1.05rem; font-weight: 500;
  color: var(--ink);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 0.85rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}



.opts button:hover { border-color: var(--ink); background: #fff; }


.answer h1 { font-size: clamp(1.7rem, 5.5vw, 2.7rem); }

.answer p { color: var(--ink-soft); margin: 0.7rem 0; max-width: 36rem; }

.answer p b { color: var(--ink); }

.actions { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-top: 1.6rem; }

.actions a {
  text-decoration: none;
  font-weight: 700; font-size: 0.98rem;
  border-radius: 0;
  padding: 0.8rem 1.4rem;
}

.actions a.main { background: var(--ink); color: #fff; }
.actions a.wa { background: var(--wa); color: #fff; }
.actions a.side { border: 1px solid var(--line); color: var(--ink); }
.actions a:hover { opacity: 0.88; }

.back {
  display: inline-block;
  margin-top: 2rem;
  font-size: 0.9rem;
  color: var(--ink-soft);
  text-decoration: none;
  cursor: pointer;
}

.back:hover { color: var(--ink); }

footer {
  display: flex; flex-wrap: wrap; gap: 0.4rem 1.4rem;
  align-items: center; justify-content: center;
  padding: 1.1rem 1.4rem 1.5rem;
  font-size: 0.8rem; color: var(--ink-soft);
  border-top: 1px solid var(--line);
  text-align: center;
}

footer a { color: var(--ink-soft); }

@media (min-width: 700px) {
  .opts.grid { display: grid; grid-template-columns: 1fr 1fr; }
}

@media (min-width: 760px) {
  header { padding-left: max(1rem, calc((100% - 62rem) / 2)); padding-right: max(1rem, calc((100% - 62rem) / 2)); }
  .topbar { padding-right: max(1rem, calc((100% - 62rem) / 2)); }
}
</style>
</head>
<body>
<div class="topbar" lang="ar" dir="rtl">بسم الله الرحمن الرحيم</div>
<header>
  <a class="mark" href="./">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a227" stroke-width="1.5">
      <rect x="5.2" y="5.2" width="13.6" height="13.6"/>
      <rect x="5.2" y="5.2" width="13.6" height="13.6" transform="rotate(45 12 12)"/>
    </svg>
    <b>Hijrah to <span>Saudi</span></b>
  </a>
  <nav>
    <a class="on" href="./">Start</a>
    <a href="../guides.html">Guides</a>
    <a href="../tools.html">Tools</a>
    <a href="../events.html">Events</a>
    <a href="../pricing.html">Pricing</a>
    <a href="../contact.html">Contact</a>
  </nav>
</header>

<main><div class="screen" id="screen"></div></main>

<footer>
  <span>Makkah &amp; Jeddah</span>
  <a href="https://wa.me/966550606619">+966 55 060 6619</a>
  <a href="../visas.html">Guides</a>
  <a href="../tools.html">Tools</a>
  <a href="../pricing.html">Pricing</a>
  <span>Private company · not a government agency · rules checked July 2026</span>
</footer>

<script>
var WA = 'https://wa.me/966550606619?text=';

var TREE = {
  start: { step: 'Jeddah · Makkah · Madinah', h: 'Make hijrah to Saudi.', sub: 'Two questions. Then your route, with real 2026 prices, from a team that lives here.', q: 'What do you want?', grid: true, opts: [
    ['Work here', 'work'], ['Study here', 'study'], ['Build a business', 'biz'], ['Buy property', 'invest'], ['Get married', 'marriage'], ['Visit first', 'visit'], ['Guide me', 'unsure']
  ]},
  work: { step: 'Question 2', h: 'Who are you?', sub: 'The work route lives or dies on your profession.', opts: [
    ['Doctor, nurse, engineer, teacher, tech', 'work-skilled'], ['Office, admin, sales', 'work-office'], ['I already hold a Saudi job offer', 'work-offer'], ['Back', 'start']
  ]},
  'work-skilled': { a: true, h: 'Saudi is hiring you.', p: [
    'These are the shortage fields. Tax-free salaries: licensed teachers make <b>SAR 12–25k a month</b> plus housing. The employer pays your visa and iqama by law, and a skilled title lets your family join you.',
    'Next step: your CV on the right desks. We know which desks.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I work in an in-demand field and want to move. My profession: ', 'wa'], ['Jobs guide', '../jobs.html', 'side']] },
  'work-office': { a: true, h: 'That door is closing. Hear it now.', p: [
    'Office, admin and sales roles are being reserved for Saudis. A year of applications will likely waste a year.',
    'Real options: retrain toward a shortage field, open a licensed business, or the investment routes. Brothers have pivoted and are here now.'
  ], btns: [['My options', 'Salam alaikum, I work in an office role. What are my realistic options? ', 'wa'], ['The business route', '../business.html', 'side']] },
  'work-offer': { a: true, h: 'Three checks before you sign.', p: [
    '<b>One:</b> the employer pays visa and iqama fees, by law. <b>Two:</b> the contract must be registered in Qiwa. <b>Three:</b> your exact job title decides whether your family can come.',
    'We run all three for a flat <b>$149</b>. Cheaper than one wrong signature.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I have a Saudi job offer and want it checked. ', 'wa'], ['The checks', '../jobs.html', 'side']] },
  study: { step: 'Question 2', h: 'How old are you?', sub: 'One rule decides the whole student route.', opts: [
    ['17–25', 'study-young'], ['26 or older', 'study-older'], ['Back', 'start']
  ]},
  'study-young': { a: true, h: 'The golden window.', p: [
    'Full scholarships: <b>free tuition, iqama, housing, healthcare, flights, monthly stipend</b>. Zero Arabic needed. The universities teach you from nothing, funded from day one. Madinah, Makkah, Jeddah.',
    'One government portal, one application window each spring. We track it and handle applications for <b>$199</b>.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I am 17-25 and want a scholarship. ', 'wa'], ['Student guide', '../study.html', 'side']] },
  'study-older': { a: true, h: 'That window closed at 25.', p: [
    'Straight answer. Still open: master\'s under 30, PhD under 35, self-funded study, or residency through work or business. And the study circles of the Haramain are free for every resident.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I am over 25 and interested in studying in Saudi. ', 'wa'], ['All options', '../study.html', 'side']] },
  biz: { step: 'Question 2', h: 'Which one is you?', sub: 'There is a right way and a prison way. We only do the right way.', opts: [
    ['I want to own my business', 'biz-own'], ['I want a Saudi partner', 'biz-partner'], ['I have serious capital', 'biz-invest'], ['Back', 'start']
  ]},
  'biz-own': { a: true, h: 'Own 100% of it. Legally.', p: [
    'A MISA license gives full foreign ownership in most sectors. Your company sponsors your iqama and your family. License fees currently waived; realistic setup <b>SAR 15–25k</b> plus your capital. Six to twelve weeks.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I want to open a business in Saudi. My idea: ', 'wa'], ['Business guide', '../business.html', 'side']] },
  'biz-partner': { a: true, h: 'Careful. One way is halal. One is five years in prison.', p: [
    'A registered joint venture with your name on the papers: fine. The famous "his name, your business, monthly fee" arrangement is <b>tasattur</b> (up to 5 years, SAR 5M fine, deportation). Enforcement is real.',
    'We connect people to the registered kind only.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I want a legal registered partnership. My field: ', 'wa'], ['Read first', '../business.html', 'side']] },
  'biz-invest': { a: true, h: 'Capital opens every door.', p: [
    '<b>SAR 800,000</b> once: permanent residency, family included, parents included. <b>SAR 4M</b> in property: residency that lasts while you own it. Since 2026 even in approved zones of Makkah and Madinah. <b>SAR 7M</b> invested + 10 jobs: investor residency, SAR 4,000 fee.',
    'At this level you talk to people, not websites.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I have capital and want to discuss residency. ', 'wa'], ['Compare routes', '../visas.html#premium', 'side']] },
  invest: { step: 'Question 2', h: 'Where?', sub: 'Foreign ownership opened in January 2026. The rules differ by city.', opts: [
    ['Jeddah or Riyadh', 'invest-home'], ['Makkah or Madinah', 'invest-haram'], ['Back', 'start']
  ]},
  'invest-home': { a: true, h: 'Open since January.', p: [
    'Non-Saudis can buy in designated zones, resident or from abroad. Residents may also own one home outside the zones. <b>SAR 4M+</b> of property carries Premium Residency with it: home and legal status in one purchase.',
    'Everything runs through the official REGA platform. We verify zones and developers before money moves.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I want to buy property. My budget and city: ', 'wa'], ['Housing guide', '../housing.html', 'side']] },
  'invest-haram': { a: true, h: 'The holy cities. Muslims only. Historic.', p: [
    'For the first time, Muslims, resident or abroad, can hold registered title in approved zones of Makkah and Madinah. The zones are the big Haram-area developments. Prices are serious. So are the scammers selling "pre-launch" units.',
    'Verify against the REGA map, or let us do it.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I am interested in property near the Haramain. ', 'wa'], ['Details', '../housing.html', 'side']] },
  marriage: { a: true, h: 'Private. Serious. Wali involved.', p: [
    'A marriage service inside our community. You send a written profile. We introduce families we know and trust. For sisters, the wali is part of it from the first message.',
    'Private throughout.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I am interested in the marriage service. I am a (brother/sister): ', 'wa'], ['How it works', '../marriage.html', 'side']] },
  visit: { a: true, h: 'Smart. Scout first.', p: [
    'Tourist eVisa: <b>~SAR 535</b>, valid a year, 90 days per stay, Umrah outside Hajj season. Walk the neighbourhoods, price the apartments, visit the schools. Then decide.',
    'We plan scouting trips for <b>$49</b>: areas, appointments, people worth meeting.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I want to plan a scouting trip to the Hijaz. ', 'wa'], ['Visa facts', '../visas.html#tourist', 'side']] },
  unsure: { a: true, h: 'Four doors. That is the whole truth.', p: [
    'A job. A scholarship. A real business. Or money. Everything else is a visit, including the tourist visa.',
    'Tell us who you are and we will point at your door. First message costs nothing.'
  ], btns: [['Get in touch on WhatsApp', 'Salam alaikum, I am not sure which route fits me. My situation: ', 'wa'], ['The 2-minute check', '../tools.html#wizard', 'side']] }
};

var path = ['start'];
var el = document.getElementById('screen');

function render() {
  var node = TREE[path[path.length - 1]];
  var h = '';
  if (node.opts) {
    h += '<div class="step">' + node.step + '</div>';
    h += '<h1>' + node.h + '</h1>';
    if (node.sub) h += '<p class="sub">' + node.sub + '</p>';
    if (node.q) h += '<p class="qline">' + node.q + '</p>';
    h += '<div class="opts' + (node.grid ? ' grid' : '') + '">' + node.opts.map(function (o, i) {
      return '<button data-i="' + i + '">' + o[0] + '</button>';
    }).join('') + '</div>';
  } else {
    h += '<div class="answer"><div class="step">Your route</div>';
    h += '<h1>' + node.h + '</h1>';
    h += node.p.map(function (p) { return '<p>' + p + '</p>'; }).join('');
    h += '<div class="actions">' + node.btns.map(function (b) {
      var cls = b[2] === 'wa' ? 'wa' : b[2];
      var href = b[2] === 'wa' ? WA + encodeURIComponent(b[1]) : b[1];
      return '<a class="' + cls + '" href="' + href + '">' + b[0] + '</a>';
    }).join('') + '</div>';
    h += '<a class="back" id="restart">Start again</a></div>';
  }
  el.innerHTML = h;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
  if (node.opts) {
    el.querySelectorAll('.opts button').forEach(function (b) {
      b.onclick = function () {
        var o = node.opts[parseInt(b.dataset.i, 10)];
        if (o[1] === 'start') { path = ['start']; } else { path.push(o[1]); }
        render();
      };
    });
  } else {
    document.getElementById('restart').onclick = function () { path = ['start']; render(); };
  }
}
render();
</script>
</body>
</html>
